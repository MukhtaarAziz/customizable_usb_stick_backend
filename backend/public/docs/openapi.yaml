openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  - url: 'http://localhost'
tags:
  - name: Authentication
    description: "\nEndpoints for authenticating users and customers."
  - name: Catalog
    description: "\nAPIs for browsing games and programs catalog"
  - name: Customers
    description: "\nManage customer accounts and governorates."
  - name: Endpoints
    description: ''
  - name: 'Game Images'
    description: "\nUpload, serve, and delete game images."
  - name: Games
    description: "\nManage games."
  - name: 'Package Category Types'
    description: "\nManage package category types (e.g., games, programs, mixed)."
  - name: 'Package Items'
    description: "\nManage items (games/programs) within a package."
  - name: Packages
    description: "\nManage packages that bundle games and programs."
  - name: 'Storage Device Orders'
    description: "\nAPIs for managing storage device orders"
  - name: 'Storage Device Types'
    description: "\nAPIs for managing storage device types (CD-ROM, DVD-ROM, USB Stick, HDD, SSD, M.2)"
  - name: 'Storage Devices'
    description: "\nAPIs for managing physical storage devices (USB sticks, HDDs, SSDs, etc.)"
  - name: 'USB Sticks'
    description: "\nManage available USB stick models."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/login:
    post:
      summary: Login
      operationId: login
      description: "Authenticate using email or phone with a password. Returns a Sanctum token and user data.\nWorks for both admin users and customers."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  user:
                    id: 1
                    name: John
                    email: user@example.com
                    role: customer
                  token: 1|abc123...
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: John
                      email:
                        type: string
                        example: user@example.com
                      role:
                        type: string
                        example: customer
                    description: 'The authenticated user or customer object.'
                  token:
                    type: string
                    example: 1|abc123...
                    description: 'The Sanctum plain-text token.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Invalid credentials.'
                properties:
                  message:
                    type: string
                    example: 'Invalid credentials.'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Identifier (email or phone) is required.'
                properties:
                  message:
                    type: string
                    example: 'Identifier (email or phone) is required.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: 'The account password.'
                  example: secret123
                email:
                  type: string
                  description: 'The email address (required if phone is not provided).'
                  example: user@example.com
                phone:
                  type: string
                  description: 'The phone number (required if email is not provided).'
                  example: '07701234567'
              required:
                - password
      security: []
  /api/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revoke the current Sanctum access token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Logged out successfully.'
                properties:
                  message:
                    type: string
                    example: 'Logged out successfully.'
      tags:
        - Authentication
  /api/me:
    get:
      summary: 'Get current user'
      operationId: getCurrentUser
      description: "Return the authenticated user's information."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: John
                  email: user@example.com
                  role: customer
                properties:
                  id:
                    type: integer
                    example: 1
                    description: 'The user ID.'
                  name:
                    type: string
                    example: John
                    description: "The user's name."
                  email:
                    type: string
                    example: user@example.com
                    description: "The user's email."
                  role:
                    type: string
                    example: customer
      tags:
        - Authentication
  /api/catalog:
    get:
      summary: 'List catalog items'
      operationId: listCatalogItems
      description: 'Retrieve a paginated list of games and/or programs with filtering options.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Number of items per page (max 100).'
          example: 15
          required: false
          schema:
            type: integer
            description: 'Number of items per page (max 100).'
            example: 15
        -
          in: query
          name: page
          description: 'Page number.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Page number.'
            example: 1
        -
          in: query
          name: type
          description: "Filter by type: 'all', 'game', or 'program'."
          example: all
          required: false
          schema:
            type: string
            description: "Filter by type: 'all', 'game', or 'program'."
            example: all
        -
          in: query
          name: search
          description: 'Search by name or tags.'
          example: action
          required: false
          schema:
            type: string
            description: 'Search by name or tags.'
            example: action
        -
          in: query
          name: category_id
          description: 'Filter by category ID.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Filter by category ID.'
            example: 1
        -
          in: query
          name: platform_id
          description: 'Filter by platform ID.'
          example: 2
          required: false
          schema:
            type: integer
            description: 'Filter by platform ID.'
            example: 2
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      name_en: 'Game Name'
                      name_ar: 'اسم اللعبة'
                      type: game
                      category:
                        id: 1
                        name_en: Action
                      platform:
                        id: 1
                        name_en: PlayStation
                  meta:
                    current_page: 1
                    last_page: 5
                    per_page: 15
                    total: 75
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        name_en: 'Game Name'
                        name_ar: 'اسم اللعبة'
                        type: game
                        category:
                          id: 1
                          name_en: Action
                        platform:
                          id: 1
                          name_en: PlayStation
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name_en:
                          type: string
                          example: 'Game Name'
                        name_ar:
                          type: string
                          example: 'اسم اللعبة'
                        type:
                          type: string
                          example: game
                        category:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name_en:
                              type: string
                              example: Action
                        platform:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name_en:
                              type: string
                              example: PlayStation
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 5
                      per_page:
                        type: integer
                        example: 15
                      total:
                        type: integer
                        example: 75
      tags:
        - Catalog
      security: []
  /api/categories:
    get:
      summary: 'List all categories'
      operationId: listAllCategories
      description: 'Retrieve a list of all available categories with bilingual names.'
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name_en:
                      type: string
                      example: Action
                    name_ar:
                      type: string
                      example: أكشن
                    description_en:
                      type: string
                      example: 'Action games'
                    description_ar:
                      type: string
                      example: 'ألعاب أكشن'
                    category_type_id:
                      type: integer
                      example: 1
                example:
                  -
                    id: 1
                    name_en: Action
                    name_ar: أكشن
                    description_en: 'Action games'
                    description_ar: 'ألعاب أكشن'
                    category_type_id: 1
                  -
                    id: 2
                    name_en: Sports
                    name_ar: رياضة
                    description_en: 'Sports games'
                    description_ar: 'ألعاب رياضية'
                    category_type_id: 1
      tags:
        - Catalog
      security: []
    post:
      summary: ''
      operationId: postApiCategories
      description: ''
      parameters: []
      responses: {}
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_type_id:
                  type: string
                  description: 'Must match an existing stored value.'
                  example: architecto
                name_en:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                name_ar:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: g
                description_en:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
                description_ar:
                  type: string
                  description: ''
                  example: architecto
                  nullable: true
              required:
                - category_type_id
                - name_en
                - name_ar
      security: []
  /api/game-platforms:
    get:
      summary: 'List game platforms'
      operationId: listGamePlatforms
      description: 'Retrieve a list of all available game platforms.'
      parameters: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    name_en:
                      type: string
                      example: 'PlayStation 4'
                    name_ar:
                      type: string
                      example: 'بلاي ستيشن 4'
                    created_at:
                      type: string
                      example: '2026-06-26T20:00:00.000000Z'
                    updated_at:
                      type: string
                      example: '2026-06-26T20:00:00.000000Z'
                example:
                  -
                    id: 1
                    name_en: 'PlayStation 4'
                    name_ar: 'بلاي ستيشن 4'
                    created_at: '2026-06-26T20:00:00.000000Z'
                    updated_at: '2026-06-26T20:00:00.000000Z'
                  -
                    id: 2
                    name_en: 'Xbox One'
                    name_ar: 'إكس بوكس ون'
                    created_at: '2026-06-26T20:00:00.000000Z'
                    updated_at: '2026-06-26T20:00:00.000000Z'
      tags:
        - Catalog
      security: []
