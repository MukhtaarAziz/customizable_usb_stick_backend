openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  - url: 'http://localhost'
tags:
  - name: Authentication
    description: "\nEndpoints for authenticating users and customers."
  - name: Categories
    description: "\nManage game categories."
  - name: 'Custom USB Orders'
    description: "\nPlace and manage custom USB stick orders."
  - name: Customers
    description: "\nManage customer accounts and governorates."
  - name: 'Game Images'
    description: "\nUpload, serve, and delete game images."
  - name: Games
    description: "\nManage games."
  - name: Packages
    description: "\nManage game packages (bundles of games for USB sticks)."
  - name: Platforms
    description: "\nManage gaming platforms."
  - name: 'USB Sticks'
    description: "\nManage available USB stick models."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/login:
    post:
      summary: Login
      operationId: login
      description: "Authenticate using email or phone with a password. Returns a Sanctum token and user data.\nWorks for both admin users and customers."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  user:
                    id: 1
                    name: John
                    email: user@example.com
                    role: customer
                  token: 1|abc123...
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: John
                      email:
                        type: string
                        example: user@example.com
                      role:
                        type: string
                        example: customer
                    description: 'The authenticated user or customer object.'
                  token:
                    type: string
                    example: 1|abc123...
                    description: 'The Sanctum plain-text token.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Invalid credentials.'
                properties:
                  message:
                    type: string
                    example: 'Invalid credentials.'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Identifier (email or phone) is required.'
                properties:
                  message:
                    type: string
                    example: 'Identifier (email or phone) is required.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  description: 'The account password.'
                  example: secret123
                email:
                  type: string
                  description: 'The email address (required if phone is not provided).'
                  example: user@example.com
                phone:
                  type: string
                  description: 'The phone number (required if email is not provided).'
                  example: '07701234567'
              required:
                - password
      security: []
  /api/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revoke the current Sanctum access token.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Logged out successfully.'
                properties:
                  message:
                    type: string
                    example: 'Logged out successfully.'
      tags:
        - Authentication
  /api/me:
    get:
      summary: 'Get current user'
      operationId: getCurrentUser
      description: "Return the authenticated user's information."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name: John
                  email: user@example.com
                  role: customer
                properties:
                  id:
                    type: integer
                    example: 1
                    description: 'The user ID.'
                  name:
                    type: string
                    example: John
                    description: "The user's name."
                  email:
                    type: string
                    example: user@example.com
                    description: "The user's email."
                  role:
                    type: string
                    example: customer
      tags:
        - Authentication
  /api/categories:
    get:
      summary: 'List categories'
      operationId: listCategories
      description: 'Get a paginated list of game categories.'
      parameters:
        -
          in: query
          name: per_page
          description: 'Number of results per page (1-100). Defaults to 15.'
          example: 15
          required: false
          schema:
            type: integer
            description: 'Number of results per page (1-100). Defaults to 15.'
            example: 15
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  current_page: 1
                  data:
                    -
                      id: 1
                      name_en: Action
                      name_ar: أكشن
                      description_en: 'Fast paced action games.'
                      description_ar: 'ألعاب أكشن سريعة التفاعل.'
                      created_at: null
                      updated_at: null
                    -
                      id: 2
                      name_en: Sport
                      name_ar: رياضة
                      description_en: 'Sports and athletic simulation games.'
                      description_ar: 'ألعاب رياضية ومحاكاة الأداء.'
                      created_at: null
                      updated_at: null
                    -
                      id: 3
                      name_en: Racing
                      name_ar: سباق
                      description_en: 'High speed racing games.'
                      description_ar: 'ألعاب سباق بسرعات عالية.'
                      created_at: null
                      updated_at: null
                    -
                      id: 4
                      name_en: RPG
                      name_ar: RPG
                      description_en: 'Role playing games with story and progression.'
                      description_ar: 'ألعاب تقمص الأدوار بقصة وتطور.'
                      created_at: null
                      updated_at: null
                    -
                      id: 5
                      name_en: Indie
                      name_ar: مستقلة
                      description_en: 'Independent games from small studios.'
                      description_ar: 'ألعاب مستقلة من استوديوهات صغيرة.'
                      created_at: null
                      updated_at: null
                  first_page_url: 'http://localhost/api/categories?per_page=15&page=1'
                  from: 1
                  last_page: 1
                  last_page_url: 'http://localhost/api/categories?per_page=15&page=1'
                  links:
                    -
                      url: null
                      label: '&laquo; Previous'
                      page: null
                      active: false
                    -
                      url: 'http://localhost/api/categories?per_page=15&page=1'
                      label: '1'
                      page: 1
                      active: true
                    -
                      url: null
                      label: 'Next &raquo;'
                      page: null
                      active: false
                  next_page_url: null
                  path: 'http://localhost/api/categories'
                  per_page: 15
                  prev_page_url: null
                  to: 5
                  total: 5
                properties:
                  current_page:
                    type: integer
                    example: 1
                  data:
                    type: array
                    example:
                      - id: 1
                        name_en: Action
                        name_ar: أكشن
                        description_en: 'Fast paced action games.'
                        description_ar: 'ألعاب أكشن سريعة التفاعل.'
                        created_at: null
                        updated_at: null
                      - id: 2
                        name_en: Sport
                        name_ar: رياضة
                        description_en: 'Sports and athletic simulation games.'
                        description_ar: 'ألعاب رياضية ومحاكاة الأداء.'
                        created_at: null
                        updated_at: null
                      - id: 3
                        name_en: Racing
                        name_ar: سباق
                        description_en: 'High speed racing games.'
                        description_ar: 'ألعاب سباق بسرعات عالية.'
                        created_at: null
                        updated_at: null
                      - id: 4
                        name_en: RPG
                        name_ar: RPG
                        description_en: 'Role playing games with story and progression.'
                        description_ar: 'ألعاب تقمص الأدوار بقصة وتطور.'
                        created_at: null
                        updated_at: null
                      - id: 5
                        name_en: Indie
                        name_ar: مستقلة
                        description_en: 'Independent games from small studios.'
                        description_ar: 'ألعاب مستقلة من استوديوهات صغيرة.'
                        created_at: null
                        updated_at: null
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name_en:
                          type: string
                          example: Action
                        name_ar:
                          type: string
                          example: أكشن
                        description_en:
                          type: string
                          example: 'Fast paced action games.'
                        description_ar:
                          type: string
                          example: 'ألعاب أكشن سريعة التفاعل.'
                        created_at:
                          type: string
                          example: null
                          nullable: true
                        updated_at:
                          type: string
                          example: null
                          nullable: true
                  first_page_url:
                    type: string
                    example: 'http://localhost/api/categories?per_page=15&page=1'
                  from:
                    type: integer
                    example: 1
                  last_page:
                    type: integer
                    example: 1
                  last_page_url:
                    type: string
                    example: 'http://localhost/api/categories?per_page=15&page=1'
                  links:
                    type: array
                    example:
                      - url: null
                        label: '&laquo; Previous'
                        page: null
                        active: false
                      - url: 'http://localhost/api/categories?per_page=15&page=1'
                        label: '1'
                        page: 1
                        active: true
                      - url: null
                        label: 'Next &raquo;'
                        page: null
                        active: false
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          example: null
                          nullable: true
                        label:
                          type: string
                          example: '&laquo; Previous'
                        page:
                          type: string
                          example: null
                          nullable: true
                        active:
                          type: boolean
                          example: false
                  next_page_url:
                    type: string
                    example: null
                    nullable: true
                  path:
                    type: string
                    example: 'http://localhost/api/categories'
                  per_page:
                    type: integer
                    example: 15
                  prev_page_url:
                    type: string
                    example: null
                    nullable: true
                  to:
                    type: integer
                    example: 5
                  total:
                    type: integer
                    example: 5
      tags:
        - Categories
      security: []
    post:
      summary: 'Create a category'
      operationId: createACategory
      description: 'Add a new game category. Admin only.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name_en: Action
                  name_ar: أكشن
                  description_en: null
                  description_ar: null
                properties:
                  id:
                    type: integer
                    example: 1
                  name_en:
                    type: string
                    example: Action
                  name_ar:
                    type: string
                    example: أكشن
                  description_en:
                    type: string
                    example: null
                    nullable: true
                  description_ar:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name_en:
                  type: string
                  description: 'English name.'
                  example: Action
                name_ar:
                  type: string
                  description: 'Arabic name.'
                  example: أكشن
                description_en:
                  type: string
                  description: 'English description.'
                  example: 'Action games'
                  nullable: true
                description_ar:
                  type: string
                  description: 'Arabic description.'
                  example: 'ألعاب الأكشن'
                  nullable: true
              required:
                - name_en
                - name_ar
  '/api/categories/{id}':
    get:
      summary: 'Show a category'
      operationId: showACategory
      description: 'Get details of a single category by ID.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name_en: Action
                  name_ar: أكشن
                  description_en: 'Action games'
                  description_ar: null
                properties:
                  id:
                    type: integer
                    example: 1
                  name_en:
                    type: string
                    example: Action
                  name_ar:
                    type: string
                    example: أكشن
                  description_en:
                    type: string
                    example: 'Action games'
                  description_ar:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Categories
      security: []
    put:
      summary: 'Update a category'
      operationId: updateACategory
      description: 'Update an existing game category. Admin only.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  id: 1
                  name_en: Racing
                  name_ar: سباق
                  description_en: 'Racing games'
                  description_ar: null
                properties:
                  id:
                    type: integer
                    example: 1
                  name_en:
                    type: string
                    example: Racing
                  name_ar:
                    type: string
                    example: سباق
                  description_en:
                    type: string
                    example: 'Racing games'
                  description_ar:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Categories
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name_en:
                  type: string
                  description: 'English name.'
                  example: Racing
                name_ar:
                  type: string
                  description: 'Arabic name.'
                  example: سباق
                description_en:
                  type: string
                  description: 'English description.'
                  example: 'Racing games'
                  nullable: true
                description_ar:
                  type: string
                  description: 'Arabic description.'
                  example: 'ألعاب السباق'
                  nullable: true
    delete:
      summary: 'Delete a category'
      operationId: deleteACategory
      description: 'Remove a game category. Admin only.'
      parameters: []
      responses:
        204:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
        - Categories
    parameters:
      -
        in: path
        name: id
        description: 'The category ID.'
        example: 1
        required: true
        schema:
          type: integer
  /api/custom-usb-orders:
    get:
      summary: 'List my orders'
      operationId: listMyOrders
      description: 'Get all custom USB orders for the authenticated customer.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '[{"id": 1, "usb_stick": {...}, "games": [...], "total_price": 15000, "status": "pending", ...}]'
      tags:
        - 'Custom USB Orders'
    post:
      summary: 'Place an order'
      operationId: placeAnOrder
      description: 'Create a new custom USB stick order with selected games.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"id\": 1,\n  \"usb_stick_id\": 1,\n  \"total_price\": 15000,\n  \"status\": \"pending\",\n  \"notes\": null,\n  \"custom_message\": null,\n  \"delivery_address\": \"Baghdad, Al-Mansour, Street 14\",\n  \"phone\": \"07701234567\",\n  \"usbStick\": {...},\n  \"games\": [...]\n}"
      tags:
        - 'Custom USB Orders'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usb_stick_id:
                  type: integer
                  description: 'The USB stick model ID.'
                  example: 1
                game_ids:
                  type: array
                  description: 'Array of game IDs to include (min 1).'
                  example:
                    - 1
                    - 2
                    - 3
                  items:
                    type: integer
                notes:
                  type: string
                  description: 'Additional order notes.'
                  example: architecto
                  nullable: true
                custom_message:
                  type: string
                  description: 'Custom message to engrave on the USB stick.'
                  example: architecto
                  nullable: true
                delivery_address:
                  type: string
                  description: 'Delivery address.'
                  example: 'Baghdad, Al-Mansour, Street 14'
                phone:
                  type: string
                  description: 'Contact phone number.'
                  example: '07701234567'
              required:
                - usb_stick_id
                - game_ids
                - delivery_address
                - phone
  '/api/custom-usb-orders/{id}':
    get:
      summary: 'Show an order'
      operationId: showAnOrder
      description: 'Get details of a single custom USB order.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"id\": 1,\n  \"usb_stick_id\": 1,\n  \"total_price\": 15000,\n  \"status\": \"pending\",\n  \"delivery_address\": \"Baghdad, Al-Mansour, Street 14\",\n  \"phone\": \"07701234567\",\n  \"usbStick\": {...},\n  \"games\": [...]\n}"
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthorized
                properties:
                  message:
                    type: string
                    example: Unauthorized
      tags:
        - 'Custom USB Orders'
    put:
      summary: 'Update an order'
      operationId: updateAnOrder
      description: 'Update an existing custom USB order (notes, games, address, etc.).'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"id\": 1,\n  \"status\": \"processing\",\n  \"usbStick\": {...},\n  \"games\": [...]\n}"
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthorized
                properties:
                  message:
                    type: string
                    example: Unauthorized
      tags:
        - 'Custom USB Orders'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  description: 'Additional order notes.'
                  example: architecto
                  nullable: true
                custom_message:
                  type: string
                  description: 'Custom message.'
                  example: architecto
                  nullable: true
                delivery_address:
                  type: string
                  description: 'Delivery address.'
                  example: architecto
                phone:
                  type: string
                  description: 'Contact phone number.'
                  example: architecto
                status:
                  type: string
                  description: 'Order status (admin only).'
                  example: processing
                game_ids:
                  type: array
                  description: 'Array of game IDs to replace current selection.'
                  example:
                    - 16
                  items:
                    type: integer
    delete:
      summary: 'Cancel an order'
      operationId: cancelAnOrder
      description: 'Delete (cancel) a custom USB order.'
      parameters: []
      responses:
        204:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: ''
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthorized
                properties:
                  message:
                    type: string
                    example: Unauthorized
      tags:
        - 'Custom USB Orders'
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the custom usb order.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: custom_usb_order
        description: 'The order ID.'
        example: 1
        required: true
        schema:
          type: integer
  /api/customers:
    post:
      summary: 'Register a customer'
      operationId: registerACustomer
      description: 'Create a new customer account. Public endpoint.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"id": 1, "name": "John Doe", "phone": "07701234567", "governorate": {...}}'
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Full name.'
                  example: 'John Doe'
                phone:
                  type: string
                  description: 'Iraqi phone number (must be unique).'
                  example: '07701234567'
                email:
                  type: string
                  description: 'Email address (must be unique).'
                  example: john@example.com
                  nullable: true
                password:
                  type: string
                  description: 'Minimum 8 characters, no spaces.'
                  example: secret123
                governorate_id:
                  type: integer
                  description: 'Governorate ID.'
                  example: 1
                address:
                  type: string
                  description: 'Address details.'
                  example: architecto
                  nullable: true
                nearest_service_point:
                  type: string
                  description: 'Nearest service point.'
                  example: architecto
                  nullable: true
              required:
                - name
                - phone
                - password
                - governorate_id
      security: []
    get:
      summary: 'List customers'
      operationId: listCustomers
      description: 'Get all registered customers with their governorates. Admin only.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Customers
  '/api/customers/{customer_id}':
    get:
      summary: 'Show a customer'
      operationId: showACustomer
      description: 'Get details of a single customer. Admin only.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"id": 1, "name": "John Doe", "phone": "07701234567", "email": "john@example.com", "governorate": {...}}'
      tags:
        - Customers
    put:
      summary: 'Update a customer'
      operationId: updateACustomer
      description: "Update an existing customer's information. Admin only."
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"id": 1, "name": "John Doe", "phone": "07701234567", "governorate": {...}}'
      tags:
        - Customers
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Full name.'
                  example: architecto
                phone:
                  type: string
                  description: 'Iraqi phone number.'
                  example: architecto
                email:
                  type: string
                  description: 'Email address.'
                  example: gbailey@example.net
                governorate_id:
                  type: integer
                  description: 'Governorate ID.'
                  example: 16
                address:
                  type: string
                  description: 'Address details.'
                  example: architecto
                  nullable: true
                nearest_service_point:
                  type: string
                  description: 'Nearest service point.'
                  example: architecto
                  nullable: true
    delete:
      summary: 'Delete a customer'
      operationId: deleteACustomer
      description: 'Remove a customer account. Admin only.'
      parameters: []
      responses:
        204:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
        - Customers
    parameters:
      -
        in: path
        name: customer_id
        description: 'The ID of the customer.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: customer
        description: 'The customer ID.'
        example: 1
        required: true
        schema:
          type: integer
  /api/governorates:
    get:
      summary: 'List governorates'
      operationId: listGovernorates
      description: 'Get a list of all Iraqi governorates for address selection.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '[{"id": 1, "name_en": "Baghdad", "name_ar": "بغداد"}, ...]'
      tags:
        - Customers
      security: []
  '/api/games/{game_id}/images/{image_id}':
    get:
      summary: 'Get an image'
      operationId: getAnImage
      description: 'Serve the full-size image file directly.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '(image/png binary content)'
        404:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
        - 'Game Images'
      security: []
    delete:
      summary: 'Delete an image'
      operationId: deleteAnImage
      description: 'Delete a game image and its associated thumbnail. Admin only.'
      parameters: []
      responses:
        204:
          description: ''
          content:
