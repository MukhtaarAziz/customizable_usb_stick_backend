  /api/customers:
    post:
      summary: 'Register a customer'
      operationId: registerACustomer
      description: 'Create a new customer account. Public endpoint.'
      parameters: []
      responses:
        201:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"id": 1, "name": "John Doe", "phone": "07701234567", "governorate": {...}}'
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Full name.'
                  example: 'John Doe'
                phone:
                  type: string
                  description: 'Iraqi phone number (must be unique).'
                  example: '07701234567'
                email:
                  type: string
                  description: 'Email address (must be unique).'
                  example: john@example.com
                  nullable: true
                password:
                  type: string
                  description: 'Minimum 8 characters, no spaces.'
                  example: secret123
                governorate_id:
                  type: integer
                  description: 'Governorate ID.'
                  example: 1
                address:
                  type: string
                  description: 'Address details.'
                  example: architecto
                  nullable: true
                nearest_service_point:
                  type: string
                  description: 'Nearest service point.'
                  example: architecto
                  nullable: true
              required:
                - name
                - phone
                - password
                - governorate_id
