      description: 'Get all registered customers with their governorates. Admin only.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Customers
  '/api/customers/{customer_id}':
    get:
      summary: 'Show a customer'
      operationId: showACustomer
      description: 'Get details of a single customer. Admin only.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"id": 1, "name": "John Doe", "phone": "07701234567", "email": "john@example.com", "governorate": {...}}'
      tags:
        - Customers
    put:
      summary: 'Update a customer'
      operationId: updateACustomer
      description: "Update an existing customer's information. Admin only."
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '{"id": 1, "name": "John Doe", "phone": "07701234567", "governorate": {...}}'
      tags:
        - Customers
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Full name.'
                  example: architecto
                phone:
                  type: string
                  description: 'Iraqi phone number.'
                  example: architecto
                email:
                  type: string
                  description: 'Email address.'
                  example: gbailey@example.net
                governorate_id:
                  type: integer
                  description: 'Governorate ID.'
                  example: 16
                address:
                  type: string
                  description: 'Address details.'
                  example: architecto
                  nullable: true
                nearest_service_point:
                  type: string
                  description: 'Nearest service point.'
                  example: architecto
                  nullable: true
    delete:
      summary: 'Delete a customer'
      operationId: deleteACustomer
      description: 'Remove a customer account. Admin only.'
      parameters: []
      responses:
        204:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: ''
      tags:
        - Customers
    parameters:
      -
        in: path
        name: customer_id
        description: 'The ID of the customer.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: customer
        description: 'The customer ID.'
        example: 1
        required: true
        schema:
          type: integer
  /api/governorates:
    get:
      summary: 'List governorates'
      operationId: listGovernorates
      description: 'Get a list of all Iraqi governorates for address selection.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            text/plain:
              schema:
                type: string
                example: '[{"id": 1, "name_en": "Baghdad", "name_ar": "بغداد"}, ...]'
      tags:
        - Customers
      security: []
  /api/game-categories:
    get:
      summary: ''
      operationId: getApiGameCategories
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  current_page: 1
                  data:
                    -
                      id: 1
                      category_type_id: 1
                      name_en: Action
                      name_ar: أكشن
                      description_en: 'Fast-paced action games with combat and adventure.'
                      description_ar: 'ألعاب أكشن سريعة مع قتال ومغامرة.'
                      created_at: null
                      updated_at: null
                    -
                      id: 2
                      category_type_id: 1
                      name_en: Racing
                      name_ar: سباق
                      description_en: 'High-speed racing and driving simulation games.'
                      description_ar: 'ألعاب سباق ومحاكاة القيادة بسرعات عالية.'
                      created_at: null
                      updated_at: null
                    -
                      id: 3
                      category_type_id: 1
                      name_en: Sports
                      name_ar: رياضة
                      description_en: 'Sports and athletic simulation games.'
                      description_ar: 'ألعاب رياضية ومحاكاة الأداء الرياضي.'
                      created_at: null
                      updated_at: null
                    -
                      id: 4
                      category_type_id: 1
                      name_en: RPG
                      name_ar: 'تقمص أدوار'
                      description_en: 'Role-playing games with story and character progression.'
                      description_ar: 'ألعاب تقمص الأدوار بقصة وتطور الشخصية.'
                      created_at: null
                      updated_at: null
                    -
                      id: 5
